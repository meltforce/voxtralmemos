name: VoxtralMemos
options:
  bundleIdPrefix: com.meltforce
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.2"
    DEVELOPMENT_TEAM: "R43S29F4G5"

packages:
  VoxtralCore:
    path: VoxtralCore

schemes:
  VoxtralMemos:
    build:
      targets:
        VoxtralMemos: all
    test:
      targets:
        - package: VoxtralCore/VoxtralCoreTests
    run:
      config: Debug
      storeKitConfiguration: VoxtralMemos/StoreKit/Products.storekit

targets:
  VoxtralMemos:
    type: application
    platform: iOS
    sources:
      - VoxtralMemos
    dependencies:
      - package: VoxtralCore
    settings:
      base:
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.meltforce.voxtralmemos
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: VoxtralMemos/VoxtralMemos.entitlements
    info:
      path: VoxtralMemos/Info.plist
      properties:
        CFBundleDisplayName: "Voxtral Memos"
        NSMicrophoneUsageDescription: "Voxtral Memos needs microphone access to record voice memos."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - voxtral-memos
        LSSupportsOpeningDocumentsInPlace: false
        CFBundleDocumentTypes:
          - CFBundleTypeName: "Audio"
            LSHandlerRank: "Alternate"
            LSItemContentTypes:
              - "public.audio"
